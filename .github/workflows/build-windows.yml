name: Build Windows VST3

on:
  push:
    branches: [main]
    paths-ignore: [web/**, '*.md']
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -B build -G "Visual Studio 17 2022" -A x64

      - name: Build
        run: cmake --build build --config Release --target UltraCombSAL_VST3

      - name: Find VST3
        id: find
        shell: bash
        run: |
          vst3dir=$(find build -type d -name "*.vst3" | head -1)
          echo "vst3dir=$vst3dir" >> "$GITHUB_OUTPUT"
          # Extract single binary for easy install
          binary=$(find "$vst3dir" -name "*.vst3" -type f 2>/dev/null || find "$vst3dir" -name "*.dll" -type f | head -1)
          mkdir -p artifact
          cp "$binary" artifact/ 2>/dev/null || cp -r "$vst3dir" artifact/

      - name: Upload VST3
        uses: actions/upload-artifact@v4
        with:
          name: UltraComb-SAL-Windows-VST3
          path: artifact/
